<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Perfectly Tranquillo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=JetBrains+Mono:wght@300;400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Caveat:wght@400;500&family=Quicksand:wght@300;400;500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    /* sophisticated deep-midnight + warm-paper palette */
    --ink:       oklch(0.14 0.04 270);
    --ink-2:     oklch(0.18 0.05 265);
    --ink-3:     oklch(0.24 0.06 260);
    --deep:      oklch(0.32 0.08 258);
    --plum:      oklch(0.38 0.09 300);
    --sea:       oklch(0.48 0.09 240);
    --sky:       oklch(0.70 0.08 230);
    --paper:     oklch(0.95 0.04 85);
    --paper-2:   oklch(0.92 0.05 85);
    --sand:      oklch(0.86 0.09 78);
    --sand-2:    oklch(0.76 0.11 68);
    --ember:     oklch(0.65 0.13 45);
    --moss:      oklch(0.55 0.08 145);
    --line:      rgba(245,241,232,0.10);
    --line-2:    rgba(245,241,232,0.06);
    --foam:      oklch(0.96 0.02 85);
    --mist:      oklch(0.90 0.03 85);
    --stone:     oklch(0.70 0.04 80);
    --coral:     oklch(0.68 0.13 40);
    --shell:     oklch(0.88 0.06 70);
  }
  html, body {
    margin: 0; padding: 0;
    background:
      radial-gradient(ellipse at 85% 95%, oklch(0.70 0.13 60 / 0.20) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 10%, oklch(0.38 0.11 260 / 0.65) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, oklch(0.30 0.10 270 / 0.75) 0%, transparent 55%),
      linear-gradient(180deg, oklch(0.22 0.06 262) 0%, oklch(0.15 0.05 270) 50%, oklch(0.11 0.04 275) 100%);
    min-height: 100vh;
    color: var(--foam);
    font-family: 'Quicksand', system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  /* paper grain — SVG noise, tiled, blended into the frame */
  .grain {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.35; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.45 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size: 220px 220px;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.25) 100%);
  }

  /* scrollbar tweak */
  .scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* utilities — DEFAULT is soft/whimsical: Fraunces + Quicksand */
  .serif { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; letter-spacing: -0.005em; }
  .mono  { font-family: 'JetBrains Mono', monospace; }
  .ui    { font-family: 'Quicksand', system-ui, sans-serif; font-weight: 500; }

  /* More serious editorial */
  .theme-instrument .serif { font-family: 'Instrument Serif', serif; font-style: normal; font-weight: 400; }
  .theme-instrument .ui    { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; }

  /* Even more whimsical — Caveat handwritten + Nunito. Caveat runs small, so bump ~1.25x. */
  .theme-caveat .serif {
    font-family: 'Caveat', cursive; font-style: normal; font-weight: 500; letter-spacing: 0;
    font-size: 1.25em; line-height: 1.1;
  }
  .theme-caveat .ui    { font-family: 'Nunito', system-ui, sans-serif; font-weight: 500; }
  .theme-caveat { font-family: 'Nunito', system-ui, sans-serif; }

  .theme-cormorant .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; }
  .theme-cormorant .ui    { font-family: 'Inter', system-ui, sans-serif; }

  button { font-family: inherit; color: inherit; }

  /* subtle constellations bg for device content */
  .stars {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.35; z-index: 1;
    background-image:
      radial-gradient(1px 1px at 20% 18%, rgba(255,248,230,0.7), transparent 60%),
      radial-gradient(1px 1px at 72% 28%, rgba(255,248,230,0.5), transparent 60%),
      radial-gradient(1px 1px at 45% 70%, rgba(255,248,230,0.55), transparent 60%),
      radial-gradient(1px 1px at 88% 82%, rgba(255,248,230,0.4), transparent 60%),
      radial-gradient(1px 1px at 12% 60%, rgba(255,248,230,0.35), transparent 60%),
      radial-gradient(1px 1px at 62% 92%, rgba(255,248,230,0.45), transparent 60%);
  }

  @keyframes float-slow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  @keyframes shimmer { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }
  @keyframes rotate-slow { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  .fade-in { animation: fade-in 0.5s ease-out both; }
</style>
</head>

<div id="root"></div>
